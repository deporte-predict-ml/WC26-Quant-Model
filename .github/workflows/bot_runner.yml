name: '🏆 WC2026 Quant Model Runner'

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run in'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      run_tests:
        description: 'Run tests before executing pipeline'
        required: false
        default: true
        type: boolean
      force_refresh:
        description: 'Force refresh all data'
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'config/**'
      - 'main.py'
      - '.github/workflows/bot_runner.yml'
  pull_request:
    branches: [main]

jobs:
  test:
    name: 'Run Tests'
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.event.inputs.run_tests == 'true' }}
    
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      - name: 'Set up Python'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 'Install dependencies'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 'Run pytest'
        run: pytest tests/ -v --tb=short

  run:
    name: 'Run Quantitative Model'
    runs-on: ubuntu-latest
    needs: test
    if: always()
    
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      - name: 'Set up Python'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 'Install dependencies'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 'Create logs directory'
        run: mkdir -p logs data
      
      - name: 'Run QuantBet WC26 Pipeline'
        env:
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL || 'INFO' }}
        run: python main.py
      
      - name: 'Upload logs on failure'
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: pipeline-logs
          path: logs/
          retention-days: 7
      
      - name: 'Upload predictions output'
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: predictions-output
          path: data/predicciones.json
          retention-days: 30
