name: WC2026 Model Runner

on:
  schedule:
    # Se ejecuta todos los días a las 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Esto te permite picarle a un botón y correrlo cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Le damos permiso al bot para escribir en el repositorio
    permissions:
      contents: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar extractor de datos
        env:
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
        run: python scripts/data_fetch.py

      - name: Ejecutar modelo matemático
        run: python scripts/poisson_core.py

      - name: Guardar cambios en el repo
        run: |
          git config --global user.name 'WC-Bot-Automator'
          git config --global user.email 'bot@github.com'
          git add data/wc2022_stats.json
          git commit -m "Actualización automática de datos: $(date)" || echo "No hay cambios para subir"
          git push
